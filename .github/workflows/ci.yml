name: CI - Skill Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Weekly scan of the scanner itself and example skills
    - cron: '0 6 * * 1'

jobs:
  lint-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install editable package
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest

      - name: Syntax and import check
        run: python -c "import scanner; print('Import successful')"

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Self-scan of repository
        run: |
          ai-skill-scanner --path . --output self-scan-report.json
          cat self-scan-report.json | head -n 50

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: self-scan-report
          path: self-scan-report.json
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-skill-scanner:test .
      - name: Test Docker run (help)
        run: docker run --rm ai-skill-scanner:test --help

  sarif:
    # Verifies the SARIF pipeline end to end and publishes the report as a
    # build artifact. We intentionally do NOT upload this self-scan to code
    # scanning: the repo ships a deliberately-malicious test fixture and the
    # tool flags its own subprocess calls, so self-scan alerts are by-design
    # noise. Downstream users scanning real skills should add the
    # github/codeql-action/upload-sarif step shown in the README.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e .

      - name: Scan and emit SARIF
        run: python scanner.py --path . --format sarif --output ai-skill-scanner.sarif

      - name: Validate SARIF structure
        run: |
          python - <<'PY'
          import json
          s = json.load(open("ai-skill-scanner.sarif"))
          assert s["version"] == "2.1.0", s.get("version")
          assert s["runs"][0]["tool"]["driver"]["name"] == "ai-skill-scanner"
          print("SARIF OK:", len(s["runs"][0]["results"]), "results")
          PY

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-skill-scanner-sarif
          path: ai-skill-scanner.sarif
          retention-days: 30