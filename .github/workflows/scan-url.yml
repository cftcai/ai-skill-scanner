name: Scan Public URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Public GitHub URL or path to skill/repo to scan'
        required: true
        type: string

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scanner
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner
        run: pip install -e .

      - name: Run scan on provided URL
        run: |
          python scanner.py --github-url "${{ github.event.inputs.url }}" --output scan-report.json || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: skill-scan-report
          path: scan-report.json
