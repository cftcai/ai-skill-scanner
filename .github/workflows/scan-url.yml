name: Scan Public URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Public GitHub URL or path to skill/repo to scan'
        required: true
        type: string

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scanner
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install scanner
        run: pip install -e .

      - name: Run scan on provided URL
        env:
          # Pass the untrusted input through the environment, never inline in the
          # shell, so it cannot be interpreted as script (command injection).
          SCAN_URL: ${{ github.event.inputs.url }}
        run: |
          python scanner.py --github-url "$SCAN_URL" --output scan-report.json

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: skill-scan-report
          path: scan-report.json
